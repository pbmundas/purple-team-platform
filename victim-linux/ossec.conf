<ossec_config>
  <client>
    <server><address>wazuh.manager</address><port>1514</port><protocol>tcp</protocol></server>
    <config-profile>ubuntu, ubuntu22, purple-lab</config-profile>
    <notify_time>10</notify_time><time-reconnect>60</time-reconnect><auto_restart>yes</auto_restart>
  </client>
  <client_buffer><disabled>no</disabled><queue_size>5000</queue_size><events_per_second>500</events_per_second></client_buffer>
  <syscheck><disabled>no</disabled><frequency>1800</frequency><directories check_all="yes" realtime="yes">/etc,/usr/bin,/usr/sbin</directories></syscheck>
  <rootcheck><disabled>no</disabled><frequency>43200</frequency></rootcheck>
  <wodle name="docker-listener"><disabled>yes</disabled></wodle>
  <localfile><log_format>syslog</log_format><location>/var/log/auth.log</location></localfile>
  <localfile><log_format>syslog</log_format><location>/var/log/purple/auth.log</location></localfile>
  <localfile><log_format>json</log_format><location>/var/log/suricata/eve.json</location></localfile>
</ossec_config>
