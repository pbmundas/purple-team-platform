name: purple-team-lab

# This file is intentionally an add-on to the official Wazuh single-node stack.
# start-lab.ps1 obtains the pinned upstream stack and combines it with this file.
services:
  # The upstream Wazuh file supplies this service. The override connects it to
  # the isolated lab network and adds the local detection content.
  wazuh.manager:
    networks: [default, purple-net]
    # Replace upstream host mappings; containers retain the standard ports.
    ports: !override
      - "${WAZUH_AGENT_PORT:-15140}:1514"
      - "${WAZUH_REGISTRATION_PORT:-15150}:1515"
      - "${WAZUH_SYSLOG_PORT:-5514}:514/udp"
      - "${WAZUH_API_PORT:-55000}:55000"
    volumes:
      - ${LAB_ROOT}/wazuh/rules/local_rules.xml:/var/ossec/etc/rules/local_rules.xml:ro
      - ${LAB_ROOT}/wazuh/agent.conf:/var/ossec/etc/shared/default/agent.conf:ro

  kali:
    build: ${LAB_ROOT}/kali
    container_name: purple-kali
    hostname: kali
    tty: true
    stdin_open: true
    cap_add: [NET_RAW, NET_ADMIN]
    networks: [purple-net]
    volumes:
      - ${LAB_ROOT}/scenarios:/opt/purple/scenarios:ro
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  caldera:
    # MITRE publishes the prebuilt GHCR image under `latest`; release numbers
    # are Git tags, not guaranteed GHCR image tags.
    image: ${CALDERA_IMAGE:-ghcr.io/mitre/caldera:latest}
    container_name: purple-caldera
    hostname: caldera
    ports:
      - "8888:8888"
    networks: [purple-net]
    volumes:
      - caldera-data:/usr/src/app/data
    restart: unless-stopped

  linux-victim:
    build: ${LAB_ROOT}/victim-linux
    container_name: purple-linux-victim
    hostname: linux-victim
    environment:
      WAZUH_MANAGER_SERVER: wazuh.manager
      WAZUH_REGISTRATION_SERVER: wazuh.manager
      WAZUH_AGENT_GROUP: default
      WAZUH_AGENT_NAME: linux-victim
      CALDERA_SERVER: http://caldera:8888
      CALDERA_GROUP: red
      CALDERA_PAW: purplelin
    depends_on:
      wazuh.manager:
        condition: service_started
    networks: [purple-net]
    volumes:
      - suricata-logs:/var/log/suricata:ro
      - linux-caldera-data:/opt/purple/caldera
    restart: unless-stopped

  ubuntu-victim:
    build: ${LAB_ROOT}/ubuntu-victim
    container_name: purple-ubuntu-victim
    hostname: ubuntu-victim
    environment:
      WAZUH_MANAGER_SERVER: wazuh.manager
      WAZUH_REGISTRATION_SERVER: wazuh.manager
      WAZUH_AGENT_GROUP: default
      WAZUH_AGENT_NAME: ubuntu-victim
      CALDERA_SERVER: http://caldera:8888
      CALDERA_GROUP: red
      CALDERA_PAW: purpleubu
    depends_on:
      wazuh.manager:
        condition: service_started
    networks: [purple-net]
    volumes:
      - ubuntu-victim-logs:/var/log
      - ubuntu-caldera-data:/opt/purple/caldera
    restart: unless-stopped

  suricata:
    image: jasonish/suricata:7.0.7
    container_name: purple-suricata
    network_mode: service:linux-victim
    depends_on: [linux-victim]
    cap_add: [NET_ADMIN, NET_RAW]
    volumes:
      - suricata-logs:/var/log/suricata
      - ${LAB_ROOT}/suricata.yaml:/etc/suricata/suricata.yaml:ro
      - ${LAB_ROOT}/suricata.rules:/var/lib/suricata/rules/local.rules:ro
    command: ["-i", "eth0", "-c", "/etc/suricata/suricata.yaml"]
    restart: unless-stopped

networks:
  purple-net:
    name: purple-net
    driver: bridge

volumes:
  caldera-data:
  linux-caldera-data:
  suricata-logs:
  ubuntu-caldera-data:
  ubuntu-victim-logs:
